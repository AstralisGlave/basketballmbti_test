<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>篮球性格测试 - BCPA专业版（含球星形象）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #e94560 0%, #c73b54 100%);
            border-radius: 30px;
            margin-bottom: 25px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            height: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: #e94560;
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 20px;
        }

        .progress-text {
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .dimension-tag {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .likert-scale {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .likert-option {
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .likert-option input {
            display: none;
        }

        .likert-option label {
            display: block;
            padding: 10px 5px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .likert-option.selected label {
            background: #e94560;
            color: white;
            transform: scale(1.02);
        }

        .likert-option .value-label {
            font-size: 0.7rem;
            color: #888;
            margin-top: 5px;
        }

        .likert-option.selected .value-label {
            color: #e94560;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #c73b54;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #eee;
            color: #333;
        }

        .btn-secondary:hover {
            background: #ddd;
        }

        .result-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .result-type {
            text-align: center;
            margin-bottom: 25px;
        }

        .type-code {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .type-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 10px 0;
        }

        .type-desc {
            color: #666;
            font-size: 0.9rem;
        }

        .dimension-result {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .dimension-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .dimension-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .dimension-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .fill-left { background: #e94560; }
        .fill-right { background: #2ecc71; }

        .star-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 15px 0;
            justify-content: center;
        }

        .star-card {
            flex: 1;
            min-width: 100px;
            text-align: center;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px 10px;
            transition: transform 0.2s;
        }

        .star-card:hover {
            transform: translateY(-5px);
        }

        .star-avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .star-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cartoon-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .cartoon-placeholder span {
            font-size: 0.6rem;
            margin-top: 5px;
        }

        .star-name {
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 8px;
            color: #333;
        }

        .star-desc {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }

        .image-tip {
            background: #e8f4fd;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            font-size: 0.75rem;
            color: #0066cc;
            text-align: center;
        }

        .suggestion {
            background: #fff3e0;
            padding: 15px;
            border-radius: 16px;
            margin-top: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .control-warning {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container { padding: 12px; }
            .card { padding: 18px; }
            .likert-option label { font-size: 0.7rem; padding: 8px 3px; }
            .question-text { font-size: 1rem; }
            .type-code { font-size: 2rem; }
            .star-avatar { width: 70px; height: 70px; }
            .star-card { min-width: 80px; }
            .cartoon-placeholder { font-size: 1.8rem; }
        }
    </style>
</head>

        function getStarAvatar(starName) {
            const imgUrl = STAR_IMAGES[starName];
            if (imgUrl) {
                return `<img src="${imgUrl}" alt="${starName}" onerror="this.onerror=null; this.parentElement.innerHTML=this.parentElement.innerHTML;">`;
            } else {
                const initial = starName.charAt(0).toUpperCase();
                const colors = ['#e94560', '#ff6b8a', '#2ecc71', '#3498db', '#9b59b6', '#f39c12', '#1abc9c'];
                const colorIndex = starName.length % colors.length;
                return `
                    <div class="cartoon-placeholder" style="background: linear-gradient(135deg, ${colors[colorIndex]}, ${colors[colorIndex]}aa);">
                        ${initial}
                        <span>🏀</span>
                    </div>
                `;
            }
        }

            "HIGFO": { name: "乱战核心(进攻)", stars: ["Magic Johnson", "Jason Williams", "Rajon Rondo"] },
            "HIGFD": { name: "乱战核心(防守)", stars: ["Rajon Rondo", "Lonzo Ball", "Jason Kidd"] },
            "HIGRO": { name: "街球发动机", stars: ["LeBron James", "Ben Simmons", "Magic Johnson"] },
            "HIGRD": { name: "全能指挥官", stars: ["LeBron James", "Ben Simmons", "Draymond Green"] },
            "HISFO": { name: "万金油(进攻)", stars: ["Scottie Pippen", "Boris Diaw", "Andre Iguodala"] },
            "HISFD": { name: "万金油(防守)", stars: ["Scottie Pippen", "Draymond Green", "Andre Iguodala"] },
            "HISRO": { name: "团队粘合剂(进攻)", stars: ["Shane Battier", "Tayshaun Prince", "Scottie Pippen"] },
            "HISRD": { name: "防守粘合剂", stars: ["Dennis Rodman", "Shane Battier", "Tony Allen"] },
            "HAGFO": { name: "球场发明家(进攻)", stars: ["LeBron James", "Draymond Green", "Bam Adebayo"] },
            "HAGFD": { name: "球场发明家(防守)", stars: ["Draymond Green", "Bam Adebayo", "LeBron James"] },
            "HAGRO": { name: "指挥官(进攻)", stars: ["Stephen Curry", "Steve Nash", "Trae Young"] },
            "HAGRD": { name: "指挥官(防守)", stars: ["Chris Paul", "Jrue Holiday", "Stephen Curry"] },
            "HASFO": { name: "机器核心(进攻)", stars: ["Nikola Jokić", "Domantas Sabonis", "Al Horford"] },
            "HASFD": { name: "机器核心(防守)", stars: ["Al Horford", "Marc Gasol", "Nikola Jokić"] },
            "HASRO": { name: "体系工程师(进攻)", stars: ["Chris Paul", "John Stockton", "Mike Conley"] },
            "HASRD": { name: "体系工程师(防守)", stars: ["Chris Paul", "Mike Conley", "Jrue Holiday"] }
        };
        const DEFAULT_STARS = ["LeBron James", "Stephen Curry", "Kevin Durant"];

        let answers = new Array(44).fill(null);
        let currentIndex = 0;
        let isTesting = true;
        let testResult = null;
        const app = document.getElementById("main-content");

        function render() {
            isTesting ? renderQuestionnaire() : renderResult();
        }

        function renderQuestionnaire() {
            const q = QUESTIONS[currentIndex];
            const currentAnswer = answers[currentIndex];
            let controlWarning = currentIndex >= 40 ? '<div class="control-warning">⚠️ 这部分题目用于检验答题真实性，请根据真实情况作答</div>' : "";
            let html = `
                <div class="progress-bar"><div class="progress-fill" style="width: ${((currentIndex + 1) / 44 * 100)}%"></div></div>
                <div class="progress-text">第 ${currentIndex + 1} / 44 题</div>
                <div class="card">
                    ${controlWarning}
                    <div class="dimension-tag">${getDimensionName(q.dim)}</div>
                    <div class="question-text">${q.text}</div>
                    <div class="likert-scale">
            `;
            [1,2,3,4,5].forEach(val => {
                const labels = ["完全不同意","不同意","中立","同意","完全同意"];
                const isSelected = currentAnswer === val;
                html += `<div class="likert-option ${isSelected ? 'selected' : ''}" data-val="${val}">
                            <label>${labels[val-1]}</label>
                            <div class="value-label">${val}</div>
                        </div>`;
            });
            html += `</div><div class="btn-group">${currentIndex > 0 ? '<button class="btn btn-secondary" id="prevBtn">◀ 上一题</button>' : ''}
                    <button class="btn btn-primary" id="nextBtn">${currentIndex === 43 ? '提交测评' : '下一题 ▶'}</button></div></div>`;
            app.innerHTML = html;
            document.querySelectorAll('.likert-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    answers[currentIndex] = parseInt(opt.dataset.val);
                    renderQuestionnaire();
                });
            });
            document.getElementById('nextBtn')?.addEventListener('click', () => {
                if (answers[currentIndex] === null) return alert('请先选择你的答案');
                if (currentIndex === 43) calculateResult();
                else { currentIndex++; renderQuestionnaire(); }
            });
            if (currentIndex > 0) document.getElementById('prevBtn')?.addEventListener('click', () => { currentIndex--; renderQuestionnaire(); });
        }

        function getDimensionName(dim) {
            const map = { "LH":"⚡ 能量获取", "IA":"🧠 信息处理", "GS":"🎯 决策判断", "FR":"🔄 行动组织", "OD":"⚔️ 攻防倾向", "CTRL":"📋 真实性校验" };
            return map[dim];
        }

        function calculateResult() {
            let ctrlSum = 0;
            for(let i=40;i<44;i++) ctrlSum += answers[i];
            if(ctrlSum/4 > 4.2 && !confirm('你的答题呈现较强的"理想自我"倾向，结果可能不完全准确。是否仍要查看结果？')) return;
            
            const dimsData = [
                { left:"L", right:"H", range:[0,7] },
                { left:"I", right:"A", range:[8,15] },
                { left:"G", right:"S", range:[16,23] },
                { left:"F", right:"R", range:[24,31] },
                { left:"O", right:"D", range:[32,39] }
            ];
            let dimensions = [];
            let fiveCodeParts = [];
            
            dimsData.forEach(d => {
                let raw = 0;
                for(let i=d.range[0]; i<=d.range[1]; i++) {
                    const q = QUESTIONS[i];
                    const score = answers[i];
                    if (score === null) {
                        alert("有未完成的题目，请返回完成");
                        return;
                    }
                    raw += q.direction === d.left ? score : (6 - score);
                }
                let typeLetter;
                if(raw >= 33) typeLetter = d.left.toUpperCase();
                else if(raw >= 25) typeLetter = d.left.toUpperCase(); // 统一用大写
                else if(raw >= 17) typeLetter = d.right.toUpperCase();
                else typeLetter = d.right.toUpperCase();
                
                let strength = raw>=33 ? "强烈" : (raw>=25 ? "轻度" : (raw>=17 ? "轻度" : "强烈"));
                dimensions.push({ left:d.left, right:d.right, rawScore:raw, type:typeLetter, strength, percent:(raw-8)/32*100 });
                fiveCodeParts.push(typeLetter);
            });
            
            const fiveCode = fiveCodeParts.join('');  // 纯大写，如 "LIGFO"
            const starData = STAR_MAP[fiveCode] || { name: "全能型球员", stars: DEFAULT_STARS };
            
            // 调试输出
            console.log("生成的五码:", fiveCode);
            console.log("匹配到的数据:", starData);
            
            testResult = { dimensions, fiveCode, typeName: starData.name, stars: starData.stars };
            isTesting = false;
            render();
        }

        function renderResult() {
            const dims = testResult.dimensions;
            const dimNames = ["能量获取","信息处理","决策判断","行动组织","攻防倾向"];
            const leftNames = ["孤星型(L)","直觉型(I)","激进型(G)","弹性型(F)","进攻型(O)"];
            const rightNames = ["枢纽型(H)","解析型(A)","稳健型(S)","结构型(R)","防守型(D)"];
            let dimsHtml = "";
            dims.forEach((d,i) => {
                const isLeft = d.type === d.left.toUpperCase();
                const barWidth = d.percent;
                const directionText = isLeft ? leftNames[i] : rightNames[i];
                dimsHtml += `<div class="dimension-result">
                    <div class="dimension-header"><span>${dimNames[i]}</span><span>${directionText} · ${d.rawScore}/40分 (${d.strength})</span></div>
                    <div class="dimension-bar"><div class="dimension-fill ${isLeft?'fill-left':'fill-right'}" style="width:${barWidth}%"></div></div>
                    <div style="font-size:0.75rem; display:flex; justify-content:space-between;"><span>${leftNames[i].split('(')[0]}</span><span>${rightNames[i].split('(')[0]}</span></div>
                </div>`;
            });
            
            let starsHtml = `<div class="star-list">${testResult.stars.map(name => `
                <div class="star-card">
                    <div class="star-avatar">${getStarAvatar(name)}</div>
                    <div class="star-name">${name}</div>
                    <div class="star-desc">🏀 相似风格</div>
                </div>
            `).join('')}</div>`;
            
            let suggestion = "";
            if(testResult.fiveCode.includes("L") && testResult.fiveCode.includes("O")) suggestion = "💡 你是天生的得分手，但注意防守端的投入。建议搭配防守型队友，并练习无球跑动来节省体力。";
            else if(testResult.fiveCode.includes("H") && testResult.fiveCode.includes("D")) suggestion = "💡 你是防守体系的指挥官，进攻端要敢于承担。建议练习挡拆后的终结能力。";
            else if(testResult.fiveCode.includes("G") && testResult.fiveCode.includes("O")) suggestion = "💡 你打球充满激情，但注意控制失误。建议建立。";
            else suggestion = "💡 你的打法非常均衡。建议根据球队需要，强化你最擅长的维度，同时每周花20分钟练习弱项。";
            
            const imageTip = `<div class="image-tip">🎨 作者 维林诺不写议论文。</div>`;
            
            const html = `
                <div class="result-card">
                    <div class="result-type">
                        <div class="type-code">${testResult.fiveCode}</div>
                        <div class="type-name">🏀 ${testResult.typeName}</div>
                        <div class="type-desc">BCPA五维度 · 44题专业版</div>
                    </div>
                    <h3 style="margin:20px 0 10px;">📊 维度分析</h3>
                    ${dimsHtml}
                    <h3 style="margin:20px 0 10px;">⭐ 相似打法球星</h3>
                    ${starsHtml}
                    ${imageTip}
                    <div class="suggestion">${suggestion}</div>
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <button class="btn btn-secondary" id="restartBtn">重新测试</button>
                        <button class="btn btn-primary" id="shareBtn">📋 复制结果</button>
                    </div>
                </div>
            `;
            app.innerHTML = html;
            document.getElementById('restartBtn')?.addEventListener('click',()=>{ answers.fill(null); currentIndex=0; isTesting=true; testResult=null; render(); });
            document.getElementById('shareBtn')?.addEventListener('click',()=>{ navigator.clipboard.writeText(`我的篮球性格是 ${testResult.fiveCode} · ${testResult.typeName}！`); alert('结果已复制！'); });
        }
        render();
    </script>
</body>
</html>
