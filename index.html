<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>篮球性格测试 - 开始界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        /* 开始卡片 */
        .start-card {
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 篮球图标 */
        .basketball-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(233,69,96,0.3);
        }

        .basketball-icon span {
            font-size: 45px;
        }

        /* 标题 */
        h1 {
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        /* 特性列表 - 5个维度 */
        .features {
            background: #f8f9fa;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .feature-item:last-child {
            border-bottom: none;
        }

        .feature-icon {
            width: 36px;
            height: 36px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .feature-text {
            flex: 1;
        }

        .feature-title {
            font-weight: 600;
            color: #333;
            font-size: 0.9rem;
        }

        .feature-desc {
            font-size: 0.7rem;
            color: #888;
            margin-top: 2px;
        }

        /* 开始按钮 */
        .start-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(233,69,96,0.3);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.4);
        }
        /* 跳转按钮 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #058fda, #05a0d9);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(233,69,96,0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.4);
        }

        /* 底部说明 */
        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="start-card">
            <!-- 篮球图标 -->
            <div class="basketball-icon">
                <span>🏀</span>
            </div>
            
            <!-- 标题 -->
            <h1>篮球性格测试</h1>
            <div class="subtitle">BCPA · 5维度专业测评</div>
            
            <!-- 5个维度介绍 -->
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">⚔️</div>
                    <div class="feature-text">
                        <div class="feature-title">攻防倾向</div>
                        <div class="feature-desc">进攻型(O) vs 防守型(D)</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🌩️</div>
                    <div class="feature-text">
                        <div class="feature-title">影响方式</div>
                        <div class="feature-desc">持球型(H) vs 无球型(N)</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💻</div>
                    <div class="feature-text">
                        <div class="feature-title">行为决策</div>
                        <div class="feature-desc">核心型(C) vs 团队型(T)</div>
                    </div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔥</div>
                    <div class="feature-text">
                        <div class="feature-title">球场性格</div>
                        <div class="feature-desc">激情型(P) vs 冷静型(Q)</div>
                    </div>
                </div>
            </div>
            
            <!-- 开始按钮 -->
            <button class="start-btn" id="startBtn">开始测试 →</button>
            
            <!-- 开始按钮 -->
            <button class="submit-btn" id="submitBtn">贡献题目 →</button>

            <!-- 底部说明 -->
            <div class="footer-note">
                作者：维林诺不写议论文
            </div>
        </div>
    </div>

    <script>
        // 开始按钮点击事件
        document.getElementById('startBtn').addEventListener('click', function() {
            // 这里可以跳转到测试界面
            window.location.href = 'v3_test_副本.html';
        });
        // 提交按钮点击事件
        document.getElementById('submitBtn').addEventListener('click', function() {
            // 这里可以跳转到测试界面
            window.location.href = 'submit.html';
        });
    </script>
    
</body>
</html>
