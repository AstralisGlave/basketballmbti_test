<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>篮球性格测试 - 多维答题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .test-card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-section {
            margin-bottom: 24px;
        }
        .progress-bar {
            height: 6px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b8a);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 0.75rem;
            color: #888;
            margin-top: 8px;
            text-align: right;
        }

        .dimension-tag {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            color: #1a1a2e;
            margin-bottom: 24px;
        }

        .multi-dim-hint {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 20px;
            font-size: 0.7rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .multi-dim-hint span {
            background: #c6a3eb;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }
        .option {
            padding: 14px 18px;
            background: #f5f5f5;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            color: #333;
            border: 1.5px solid transparent;
        }
        .option:hover {
            background: #e0e0e0;
            transform: translateX(4px);
        }
        .option.selected {
            background: #e94560;
            color: white;
            border-color: #e94560;
            transform: translateX(0);
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #ccc;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            text-decoration: none;
        }
        .back-link:hover {
            color: white;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>加载题库中...</p>
        </div>
    </div>

    <script>
        // 全局变量
        let QUESTIONS = [];
        let currentIndex = 0;
        let answers = [];
        let scores = { O: 0, D: 0, H: 0, N: 0, C: 0, T: 0, P: 0, Q: 0 };
        

        const QUESTIONS_PER_TEST = 15;// 每次测试随机抽取15题

        const DIM_NAMES_FULL = {
            O: "进攻型", D: "防守型",
            H: "持球型", N: "无球型",
            C: "核心型", T: "团队型",
            P: "激情型", Q: "冷静型"
        };

        // DOM 元素
        let progressFill, progressText, dimensionTag, questionText, multiDimHint, optionsContainer, prevBtn, nextBtn;

        // ============================================================
        // 随机抽取函数（Fisher-Yates 洗牌算法）
        // ============================================================
        function getRandomQuestions(arr, count) {
            // 复制原数组，避免修改原数据
            const shuffled = [...arr];
            // 洗牌算法：随机打乱数组顺序
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            // 返回前 count 个
            return shuffled.slice(0, Math.min(count, shuffled.length));
        }

        function getDimensionHintText(sources) {
            let html = '📊 题目来源：';
            for (let dim of sources) {
                html += `<span>${dim}</span>`;
            }
            return html;
        }

        function renderCurrentQuestion() {
            const q = QUESTIONS[currentIndex];
            const selectedOptionIndex = answers[currentIndex];
            
            const progressPercent = ((currentIndex + 1) / QUESTIONS.length) * 100;
            progressFill.style.width = `${progressPercent}%`;
            progressText.textContent = `第 ${currentIndex + 1} / ${QUESTIONS.length} 题`;
            
            dimensionTag.textContent = `📝 题目 ${currentIndex + 1}`;
            questionText.textContent = q.text;
            multiDimHint.innerHTML = getDimensionHintText(q.sources);
            
            let optionsHtml = '';
            for (let i = 0; i < q.options.length; i++) {
                const opt = q.options[i];
                const isSelected = (selectedOptionIndex === i);
                optionsHtml += `
                    <div class="option ${isSelected ? 'selected' : ''}" data-opt-index="${i}">
                        ${opt.text}
                    </div>
                `;
            }
            optionsContainer.innerHTML = optionsHtml;
            
            document.querySelectorAll('.option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const optIndex = parseInt(opt.dataset.optIndex);
                    answers[currentIndex] = optIndex;
                    renderCurrentQuestion();
                });
            });
            
            if (currentIndex > 0) {
                prevBtn.style.display = 'block';
            } else {
                prevBtn.style.display = 'none';
            }
            
            if (currentIndex === QUESTIONS.length - 1) {
                nextBtn.textContent = '提交测评';
            } else {
                nextBtn.textContent = '下一题 ▶';
            }
        }

        function calculateFinalResult() {
            for (let k in scores) scores[k] = 0;
            
            for (let i = 0; i < answers.length; i++) {
                const optIndex = answers[i];
                if (optIndex !== null) {
                    const optScores = QUESTIONS[i].options[optIndex].scores;
                    for (let dim in optScores) {
                        scores[dim] += optScores[dim];
                    }
                }
            }
            
            const typeOD = scores.O >= scores.D ? 'O' : 'D';
            const typeHN = scores.H >= scores.N ? 'H' : 'N';
            const typeCT = scores.C >= scores.T ? 'C' : 'T';
            const typePQ = scores.P >= scores.Q ? 'P' : 'Q';
            const fullCode = typeOD + typeHN + typeCT + typePQ;
            
            const resultData = {
                code: fullCode,
                scores: scores,
                dimensions: [
                    { left: "O", right: "D", leftName: "进攻型", rightName: "防守型", leftScore: scores.O, rightScore: scores.D },
                    { left: "H", right: "N", leftName: "持球型", rightName: "无球型", leftScore: scores.H, rightScore: scores.N },
                    { left: "C", right: "T", leftName: "核心型", rightName: "团队型", leftScore: scores.C, rightScore: scores.T },
                    { left: "P", right: "Q", leftName: "激情型", rightName: "冷静型", leftScore: scores.P, rightScore: scores.Q }
                ]
            };
           
            localStorage.setItem('basketballTestResult', JSON.stringify(resultData));
            window.location.href = 'v3_result.html';
        }

        function nextQuestion() {
            if (answers[currentIndex] === null) {
                alert('请选择一个选项');
                return;
            }
            if (currentIndex === QUESTIONS.length - 1) {
                calculateFinalResult();
            } else {
                currentIndex++;
                renderCurrentQuestion();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrentQuestion();
            }
        }

        function showTestInterface() {
            const html = `
                <div class="test-card">
                    <div class="progress-section">
                        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                        <div class="progress-text" id="progressText">第 1 / ${QUESTIONS.length} 题</div>
                    </div>
                    <div class="dimension-tag" id="dimensionTag">📝 情景题</div>
                    <div class="question-text" id="questionText">加载中...</div>
                    <div class="multi-dim-hint" id="multiDimHint">题目来源：</div>
                    <div class="options" id="optionsContainer"></div>
                    <div class="btn-group">
                        <button class="btn-secondary" id="prevBtn" style="display: none;">◀ 上一题</button>
                        <button class="btn-primary" id="nextBtn">下一题 ▶</button>
                    </div>
                </div>
                <a href="index.html" class="back-link">← 返回首页</a>
            `;
            document.getElementById('app').innerHTML = html;
            
            progressFill = document.getElementById('progressFill');
            progressText = document.getElementById('progressText');
            dimensionTag = document.getElementById('dimensionTag');
            questionText = document.getElementById('questionText');
            multiDimHint = document.getElementById('multiDimHint');
            optionsContainer = document.getElementById('optionsContainer');
            prevBtn = document.getElementById('prevBtn');
            nextBtn = document.getElementById('nextBtn');
            
            nextBtn.addEventListener('click', nextQuestion);
            prevBtn.addEventListener('click', prevQuestion);
            
            answers = new Array(QUESTIONS.length).fill(null);
            renderCurrentQuestion();
        }

        // 从 JSON 加载题目
        fetch("questions.json")
            .then(res => res.json())
            .then(data => {
                if (Array.isArray(data)) {
                    allQUESTIONS = data;
                } else if (data.questions && Array.isArray(data.questions)) {
                    allQUESTIONS = data.questions;
                } else {
                    throw new Error('格式错误');
                }

                console.log(`📚 题库共 ${allQuestions.length} 题`);
                // 随机抽取15题
                if (allQuestions.length > QUESTIONS_PER_TEST) {
                    QUESTIONS = getRandomQuestions(allQUESTIONS, QUESTIONS_PER_TEST);
                    console.log(`🎲 随机抽取 ${QUESTIONS.length} 题（共${QUESTIONS_PER_TEST}题）`);
                } else {
                    QUESTIONS = allQuestions;
                    console.log(`⚠️ 题库不足${QUESTIONS_PER_TEST}题，使用全部 ${QUESTIONS.length} 题`);
                }
                
                if (QUESTIONS.length === 0) {
                    throw new Error('题库为空');
                }

                showTestInterface();
            })
            .catch(err => {
                console.error('加载失败:', err);
                document.getElementById('app').innerHTML = `
                    <div class="test-card" style="text-align: center;">
                        <div style="font-size: 3rem; margin-bottom: 16px;">😵</div>
                        <h3>题库加载失败</h3>
                        <p style="color: #666; margin: 16px 0;">请确保 questions.json 文件存在</p>
                        <button class="btn-primary" onclick="location.reload()">重新加载</button>
                        <a href="index.html" class="back-link" style="display: block; margin-top: 20px;">← 返回首页</a>
                    </div>
                `;
            });
    </script>
</body>
</html>
